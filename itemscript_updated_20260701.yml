  - Id: 470456
    AegisName: Ayothaya_Boots_LT_TH
    Name: "Ayothaya Adventurer's Boots-LT"
    Type: Armor
    Weight: 200
    Defense: 20
    Slots: 1
    Locations:
      Shoes: true
    ArmorLevel: 2
    EquipLevelMin: 100
    Refineable: true
    Gradable: true
    Script: |
      .@r = getrefine();
      .@g = getenchantgrade();
      bonus bShortAtkRate,12;
      bonus bLongAtkRate,12;
      bonus bMatkRate,12;
      bonus bAspdRate,15;
      bonus bMaxHPRate,15;
      bonus bMaxSPRate,10;
      bonus bBaseAtk,15*(.@r/2);
      bonus bMatk,15*(.@r/2);
      if (.@r>=7) {
         bonus bPAtk,10;
         bonus bSMatk,10;
         if (.@r>=9) {
             bonus bVariableCastRate,-20;
             bonus bFixedCast,-500;
             if (.@r>=12) {
                 bonus2 bAddEle,Ele_All,15;
                 bonus2 bMagicAtkEle,Ele_All,15;
             }
         }
      }
      if (.@g>=ENCHANTGRADE_D) {
         bonus bFixedCast,-500;
         if (.@g>=ENCHANTGRADE_C) {
            bonus bNonCritAtkRate,20;
            bonus bCritAtkRate,20;
            bonus2 bMagicAtkEle,Ele_All,25;
            if (.@g>=ENCHANTGRADE_B) {
               bonus bPAtk,10;
               bonus bSMatk,10;
               if (.@g>=ENCHANTGRADE_A) {
                  bonus bAllStats,.@r*2;
                  bonus bAllTraitStats,.@r*2;
               }
            }
         }
      }
